name: Maven CI

on:
  push:
    branches: [ master, main, develop ]

  pull_request:
    branches: [ master, main, develop ]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        java-version: [ '21' ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version }}
          distribution: temurin
          cache: maven

      - name: Make mvnw executable
        run: chmod +x mvnw
        working-directory: ./ratelimiter

      - name: Build and verify with Maven
        run: ./mvnw -B clean verify
        working-directory: ./ratelimiter

      - name: Generate test report
        if: always()
        run: ./mvnw surefire-report:report
        working-directory: ./ratelimiter

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ratelimiter/target/surefire-reports/

      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: ratelimiter/target/surefire-reports/**/*.xml
          check_name: Test Results

  docker:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: ./ratelimiter
          file: ./ratelimiter/Dockerfile
          push: true
          tags: |
            ishukarnarudockerhub/ratelimiter-maven-project:latest
            ishukarnarudockerhub/ratelimiter-maven-project:${{ github.sha }}
